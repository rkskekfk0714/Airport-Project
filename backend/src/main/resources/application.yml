spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:baseball}
    username: ${DB_USER:baseball}
    password: ${DB_PASSWORD:baseball123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:baseball-ticketing-secret-key-must-be-at-least-256-bits-long}
  access-token-expiration: 3600000    # 1시간
  refresh-token-expiration: 604800000 # 7일

seat:
  hold:
    timeout-minutes: 5

reservation:
  max-per-game: 4

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.baseball: DEBUG

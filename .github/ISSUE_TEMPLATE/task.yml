name: 📋 주차별 일감
description: 주차별 학습/실습 일감 등록
labels: ["📋 task"]
body:
  - type: dropdown
    id: week
    attributes:
      label: 주차
      options:
        - W01
        - W02
        - W03
        - W04
        - W05
        - W06
        - W07
        - W08
        - W09
        - W10
        - W11
        - W12
        - W13
        - W14
        - W15
        - W16
        - W17
        - W18
        - W19
        - W20
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 일감 내용
      placeholder: "학습/실습 내용을 작성해주세요"
    validations:
      required: true
  - type: textarea
    id: deliverables
    attributes:
      label: 산출물
      placeholder: "제출해야 할 산출물을 나열해주세요"
  - type: input
    id: due_date
    attributes:
      label: 마감일
      placeholder: "YYYY-MM-DD"

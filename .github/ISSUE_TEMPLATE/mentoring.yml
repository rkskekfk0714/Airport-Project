name: 🎓 멘토링
description: 멘토링 세션 기록
labels: ["🎓 mentoring"]
body:
  - type: input
    id: datetime
    attributes:
      label: 일시
      placeholder: "YYYY-MM-DD HH:MM ~ HH:MM"
    validations:
      required: true
  - type: input
    id: mentor
    attributes:
      label: 멘토
      placeholder: "마노 강사님"
    validations:
      required: true
  - type: dropdown
    id: method
    attributes:
      label: 방식
      options:
        - 대면
        - 온라인
    validations:
      required: true
  - type: textarea
    id: qa
    attributes:
      label: 질의응답
      placeholder: |
        ### Q1. [질문]
        > 답변 요약

        ### Q2. [질문]
        > 답변 요약
    validations:
      required: true
  - type: textarea
    id: feedback
    attributes:
      label: 피드백
      placeholder: "멘토로부터 받은 피드백을 정리해주세요"
  - type: textarea
    id: action_items
    attributes:
      label: Action Items
      placeholder: "- [ ] 이름: 할 일 (마감: MM/DD)"

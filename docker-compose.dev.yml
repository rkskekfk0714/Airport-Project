# 로컬 개발용: DB + Redis만 Docker로 실행
# Spring Boot: ./gradlew bootRun (별도 터미널)
# React: npm run dev (별도 터미널)
services:
  postgres:
    image: postgres:16-alpine
    container_name: baseball-postgres-dev
    environment:
      POSTGRES_DB: baseball
      POSTGRES_USER: baseball
      POSTGRES_PASSWORD: baseball123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: baseball-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  postgres_dev_data:
  redis_dev_data:
